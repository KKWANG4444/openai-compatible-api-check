name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run verify

  action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate action metadata
        run: |
          ruby -e '
            require "yaml"
            metadata = YAML.load_file("action.yml")
            abort "invalid action name" unless metadata["name"] == "OpenAI Compatible API Check"
            abort "invalid action runtime" unless metadata.dig("runs", "using") == "docker"
            abort "missing Dockerfile" unless metadata.dig("runs", "image") == "Dockerfile"
            abort "missing required input" unless metadata.dig("inputs", "api-key", "required") == true
            expected_args = metadata.fetch("inputs").keys.map { |id| "${" + "{ inputs.#{id} }}" }
            abort "Docker inputs are not wired through runs.args" unless metadata.dig("runs", "args") == expected_args
            abort "missing output" unless metadata.dig("outputs", "report-path")
            puts "action.yml semantics valid"
          '
      - name: Exercise local action through GitHub runner
        id: local-action
        continue-on-error: true
        uses: ./
        with:
          base-url: https://example.com/v1
          model: ci-input-wiring
          api-key: ci-placeholder-key
          timeout: "1000"
          report-path: reports/ci-input-wiring.md
      - name: Verify GitHub passed Docker action inputs
        if: always()
        env:
          OUTCOME: ${{ steps.local-action.outcome }}
        run: |
          test "$OUTCOME" = failure
          test -f reports/ci-input-wiring.md
          grep -q 'ci-input-wiring' reports/ci-input-wiring.md
      - name: Build GitHub Action image
        run: docker build -t openai-compatible-api-check-action .
      - name: Smoke-test GitHub Action container
        run: |
          docker run --rm --entrypoint node openai-compatible-api-check-action \
            /opt/model-api-check/bin/model-api-check.mjs --version | grep -qx '1.0.2'
          set +e
          output=$(docker run --rm openai-compatible-api-check-action 2>&1)
          status=$?
          set -e
          test "$status" -eq 2
          grep -q "input base-url is required" <<< "$output"
